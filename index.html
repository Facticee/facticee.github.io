<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header>

      <h1>Dashboard</h1>
      <button id="add-service-btn" class="add-services-btn">+ Add Service</button>
      <div class="uhr" id="live-uhr">00:00:00</div>


    </header>

    <main class="grid">

      <div class="card">
        <div class="card-header">
          <h2>Portainer</h2>
          <div class="status-dot" data-url="http://localhost:9000"></div>
        </div>
        <p>portainer</p>
        <div class="card-links">
          <a href="#" class="btn">Open App</a>
          <a href="#" class="btn">Logs</a>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Nextcloud</h2>
          <div class="status-dot" data-url="http://localhost:8080"></div>
        </div>
        <p>Cloud Storage</p>
        <div class="card-links">
          <a href="#" class="btn">Open App</a>
        </div>

      </div>

      <div class="card">
        <div class="card-header">
          <h2>Nginx Proxy</h2>
          <div class="status-dot" data-url="http://localhost:81"></div>
        </div>
        <p>Reverse Proxy Manager</p>
        <div class="card-links">
          <a href="#" class="btn">Open App</a>
          <a href="#" class="btn">Config</a>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Pi-hole</h2>
          <div class="status-dot" data-url="http://localhost/admin"></div>
        </div>
        <p>DNS-Server</p>
        <div class="card-links">
          <a href="#" class="btn">Admin Panel</a>
        </div>
      </div>

    </main>
  </div>




  <div class="overlay hidden" id="overlay">
    <div class="popup">
      <h3>Service hinzufügen</h3>
      <label>
        Name
        <input type="text" id="input-name">
      </label>

      <label>
        URL
        <input type="text" id="input-url" placeholder="eg http://localhost:9000">
      </label>

      <label>
        Description (optional)
        <input type="text" id="input-description">
      </label>

      <div class="popup-buttons">
      <button id="popup-cancel" class="cancel-button">Abbrechen</button>
      <button id="popup-save" class="save-button">Speichern</button>
    </div>
    </div>
  </div>







  <script>
    // Uhr
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('live-uhr').textContent = `${h}:${m}:${s}`;
    }

    updateClock();
    setInterval(updateClock, 1000);


    async function checkStatus(dot) {
      const url = dot.dataset.url;

      try {
        await fetch(url, { mode: "no-cors" });

        //  grün
        dot.style.background = "#00ff9d";
        dot.style.boxShadow = "0 0 6px #00ff9d";

      } catch (e) {
        //rot nicht erreichbar
        dot.style.background = "red";
        dot.style.boxShadow = "0 0 6px red";
      }
    }







    // overlay pop up
    const overlay = document.getElementById('overlay');
    const inputName = document.getElementById('input-name');
    const inputUrl = document.getElementById('input-url');
    const inputDescription = document.getElementById('input-description');

    const saveBtn = document.getElementById('popup-save');
    const cancelBtn = document.getElementById('popup-cancel');
    const addBtn = document.getElementById('add-service-btn');

    function openOverlay() {
      overlay.classList.remove('hidden');
      inputName.focus();
    }

    function closeOverlay() {
      overlay.classList.add('hidden');

      inputName.value = '';
      inputUrl.value = '';
      inputDescription.value = '';
    }

    function saveData() {
      const name = inputName.value.trim();
      const url = inputUrl.value.trim();
      const description = inputDescription.value.trim();

      if (!name || !url) {
        alert('Name and URL must be set');
        return;
      }

      console.log('Gespeichert:', { name, url, description });
      closeOverlay();
    }

    // Events
    addBtn.addEventListener('click', openOverlay);
    cancelBtn.addEventListener('click', closeOverlay);
    saveBtn.addEventListener('click', saveData);

    // wenn auf overlay klick dann schließen (nicht auf popup)
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeOverlay();
    });

    // Enter macht save
    inputDescription.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveData();
    });











    function checkAll() {
      document.querySelectorAll(".status-dot").forEach(checkStatus);
    }

    checkAll();
    setInterval(checkAll, 10000);
  </script>

</body>
</html>
