<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>Dashboard</h1>
    <button id="add-service-btn" class="add-services-btn">+ Add Service</button>
    <div class="uhr" id="live-uhr">00:00:00</div>
  </header>

  <main class="grid" id="grid"></main>


</div>




<div class="overlay hidden" id="overlay">
  <div class="popup">
    <h3>Add Service</h3>
    <label>
      Name
      <input type="text" id="input-name">
    </label>

    <label>
      URL (use http:// or https://)
      <input type="text" id="input-url" placeholder="http://localhost:9000">
    </label>

    <label>
      Description (optional)
      <input type="text" id="input-description">
    </label>

    <div class="popup-buttons">
      <button id="popup-cancel" class="cancel-button">Cancel</button>
      <button id="popup-save" class="save-button">Save</button>
    </div>
  </div>
</div>







<script>



  // Uhr
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');

    document.getElementById('live-uhr').textContent = `${h}:${m}:${s}`;
  }

  updateClock();
  setInterval(updateClock, 1000);






  // Status Anzeigen Indicator
  async function checkStatus(dot) {
    const url = dot.dataset.url;

    try {
      await fetch(url, { mode: "no-cors" });

      //  grün
      dot.style.background = "#00ff9d";
      dot.style.boxShadow = "0 0 6px #00ff9d";

    } catch (e) {
      //rot nicht erreichbar
      dot.style.background = "red";
      dot.style.boxShadow = "0 0 6px red";
    }
  }

  // damit der nach 10sek immer weiter checkt

  function checkAll() {
    document.querySelectorAll(".status-dot").forEach(checkStatus);
  }

  checkAll();
  setInterval(checkAll, 10000);







  // Karten per add service knopf hinzufügen

  const STORAGE_KEY = 'dashboard-services';
  const grid = document.getElementById('grid');

  let services = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
    { id: 'portainer', name: 'GitHub', url: 'https://github.com', desc: '' },
    { id: 'nextcloud', name: 'Hacktime', url: 'https://hackatime.hackclub.com', desc: '' }
  ];

  // Schutz gegen XSS danke gemini
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // speichern
  function renderServices() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(services)); // sichert den aktuellen Stand
    if (!grid) return;


    grid.innerHTML = services.map(s => `


    <div class="card" data-id="${s.id}">
      <div class="card-header">
        <h2>${escapeHtml(s.name)}</h2>
        <div class="status-dot" data-url="${escapeHtml(s.url)}"></div>
      </div>
      <p>${escapeHtml(s.desc || '')}</p>
      <div class="card-links">
        <a href="${escapeHtml(s.url)}" target="_blank" class="btn">Open App</a>
      </div>
      <div class="card-delete" title="Double click to delete">×</div>
    </div>


  `).join('');

    if (typeof checkAll === 'function') checkAll();
  }

  // delete funktion
  grid.addEventListener('dblclick', e => {
    if (e.target.classList.contains('card-delete')) {
      const id = e.target.closest('.card').dataset.id;
      services = services.filter(s => s.id !== id);
      renderServices(); // neu speichern und nue anzeigen
    }
  });

  renderServices();








  // overlay pop up
  const overlay = document.getElementById('overlay');
  const inputName = document.getElementById('input-name');
  const inputUrl = document.getElementById('input-url');
  const inputDescription = document.getElementById('input-description');

  const saveBtn = document.getElementById('popup-save');
  const cancelBtn = document.getElementById('popup-cancel');
  const addBtn = document.getElementById('add-service-btn');

  function openOverlay() {
    overlay.classList.remove('hidden');
    inputName.focus();
  }

  function closeOverlay() {
    overlay.classList.add('hidden');

    inputName.value = '';
    inputUrl.value = '';
    inputDescription.value = '';
  }

  function saveData() {
    const name = inputName.value.trim();
    const url = inputUrl.value.trim();
    const description = inputDescription.value.trim();

    if (!name || !url) return alert('Name and URL must be set');

    // damit man nicht " javascript: " ins feld eingeben kann
    if (!url.toLowerCase().startsWith('http://') && !url.toLowerCase().startsWith('https://')) {
      return alert('The URL must start with http:// or https:// ');
    }


    services.push({
      id: 'service-' + Date.now(),
      name: name,
      url: url,
      desc: description
    });

    renderServices();
    closeOverlay();
  }

  // Events
  addBtn.addEventListener('click', openOverlay);
  cancelBtn.addEventListener('click', closeOverlay);
  saveBtn.addEventListener('click', saveData);

  // wenn auf overlay klick dann schließen (nicht auf popup)
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });

  // Enter saved
  inputName.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveData();
  });

  inputUrl.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveData();
  });

  inputDescription.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveData();
  });



</script>

</body>
</html>
